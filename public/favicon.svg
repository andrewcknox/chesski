<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">
  <defs>
    <clipPath id="frame">
      <rect x="0" y="0" width="256" height="256" rx="32" ry="32"/>
    </clipPath>
  </defs>

  <g clip-path="url(#frame)">
    <!-- 2x2 lichess-style board -->
    <rect x="0"   y="0"   width="128" height="128" fill="#b58863"/>
    <rect x="128" y="0"   width="128" height="128" fill="#f0d9b5"/>
    <rect x="0"   y="128" width="128" height="128" fill="#f0d9b5"/>
    <rect x="128" y="128" width="128" height="128" fill="#b58863"/>

    <!-- Curved snow slope: top-left high, descending and flattening to bottom-right.
         Quadratic Bezier from (-10, 40) via (100, 180) to (266, 220). -->
    <path d="M -10,40 Q 100,180 266,220 L 266,266 L -10,266 Z" fill="#f5f9fc"/>
    <!-- Faint shadow band parallel below the surface -->
    <path d="M -10,80 Q 110,210 266,250 L 266,266 L -10,266 Z" fill="#cdd5e0" opacity="0.32"/>
    <!-- Crisp ridgeline highlight along the curve -->
    <path d="M -10,40 Q 100,180 266,220" fill="none" stroke="#ffffff" stroke-width="3.5" stroke-linecap="round"/>

    <!-- Motion streaks behind the skier -->
    <g stroke="#ffffff" stroke-width="4" stroke-linecap="round" opacity="0.85">
      <line x1="14" y1="78"  x2="56" y2="98"/>
      <line x1="12" y1="108" x2="54" y2="128"/>
      <line x1="14" y1="138" x2="56" y2="158"/>
    </g>

    <!--
      Skier group: feet at the local origin, slope tangent ~30° at the knight's position.
      Translated to (140, 170) — the slope curve passes near here — and rotated 30°.
      Drawing order inside the group: pole (back), skis, knight (front).
    -->
    <g transform="translate(140 170) rotate(30)">

      <!-- Ski pole: planted up-slope behind the skier (extends back-left in local coords).
           Thick dark shaft, large basket, bright red grip. -->
      <g>
        <line x1="-95" y1="20" x2="22" y2="-110"
              stroke="#1c1c1f" stroke-width="5.5" stroke-linecap="round"/>
        <!-- Basket (planted in the snow) -->
        <circle cx="-95" cy="20" r="8" fill="#f5f9fc" stroke="#1c1c1f" stroke-width="3"/>
        <!-- Grip -->
        <rect x="18" y="-115" width="11" height="22" rx="3"
              fill="#d23645" stroke="#1c1c1f" stroke-width="1.5"
              transform="rotate(48 24 -104)"/>
      </g>

      <!-- Skis: two parallel red blades, centered horizontally under the knight -->
      <g>
        <rect x="-72" y="0"  width="144" height="9" rx="4.5" fill="#d23645" stroke="#1c1c1f" stroke-width="1.2"/>
        <rect x="-72" y="13" width="144" height="9" rx="4.5" fill="#d23645" stroke="#1c1c1f" stroke-width="1.2"/>
        <!-- Upturned ski tips -->
        <path d="M 72,0  C 86,0  90,4  88,9  L 72,9  Z" fill="#d23645" stroke="#1c1c1f" stroke-width="1.2"/>
        <path d="M 72,13 C 86,13 90,17 88,22 L 72,22 Z" fill="#d23645" stroke="#1c1c1f" stroke-width="1.2"/>
      </g>

      <!-- Knight: lichess cburnett, mirrored to face right, scaled 3.1x.
           Shifted so the base centers on (0,0). Knight is ~140 tall after scaling. -->
      <g transform="translate(-70 -136)">
        <g transform="scale(3.1)">
          <g transform="translate(45 0) scale(-1 1)">
            <g fill="none" fill-rule="evenodd" stroke="#000"
               stroke-linecap="round" stroke-linejoin="round" stroke-width="1.2">
              <path fill="#000" d="M22 10c10.5 1 16.5 8 16 29H15c0-9 10-6.5 8-21"/>
              <path fill="#000" d="M24 18c.38 2.91-5.55 7.37-8 9-3 2-2.82 4.34-5 4-1.04-.94 1.41-3.04 0-3-1 0 .19 1.23-1 2-1 0-4 1-4-4 0-2 6-12 6-12s1.89-1.9 2-3.5c-.73-1-.5-2-.5-3 1-1 3 2.5 3 2.5h2s.78-2 2.5-3c1 0 1 3 1 3"/>
              <path fill="#ececec" stroke="#ececec" d="M9.5 25.5a.5.5 0 1 1-1 0 .5.5 0 1 1 1 0m5.43-9.75a.5 1.5 30 1 1-.86-.5.5 1.5 30 1 1 .86.5"/>
              <path fill="#ececec" stroke="none" d="m24.55 10.4-.45 1.45.5.15c3.15 1 5.65 2.49 7.9 6.75S35.75 29.06 35.25 39l-.05.5h2.25l.05-.5c.5-10.06-.88-16.85-3.25-21.34s-5.79-6.64-9.19-7.16z"/>
            </g>
          </g>
        </g>
      </g>
    </g>
  </g>

  <!-- Outer border for definition at small sizes -->
  <rect x="0.5" y="0.5" width="255" height="255" rx="32" ry="32"
        fill="none" stroke="#000" stroke-opacity="0.25" stroke-width="1"/>
</svg>
