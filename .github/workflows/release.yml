name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Vite app
        run: npm run build

      - name: Package into standalone exe
        run: >
          npx @yao-pkg/pkg scripts/chesski-server.cjs
          --target node20-win-x64
          --output release/Chesski.exe
          --icon public/chesski.ico

      - name: Build installer
        uses: Minionguyjpro/Inno-Setup-Action@v1.2.4
        with:
          path: installer/chesski.iss
          options: /DAppVersion=${{ github.ref_name }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/CheskiSetup.exe
          generate_release_notes: true
          fail_on_unmatched_files: true
